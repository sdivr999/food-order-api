<!DOCTYPE html>

<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>如意樂活蔬食早午餐</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #faf7f2; color: #2d2016; }
    .header { background: #2d2016; color: #f5e6c8; padding: 16px 20px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(45,32,22,0.3); }
    .header-top { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; }
    .brand { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; }
    .brand span { color: #e8a84a; }
    .cart-btn { background: #e8a84a; border: none; border-radius: 50px; padding: 7px 14px; font-size: 13px; font-weight: 500; color: #2d2016; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .cart-badge { background: #2d2016; color: #e8a84a; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
    .header-sub { font-size: 11px; color: #a08060; padding-bottom: 10px; }
    .cat-tabs { display: flex; gap: 6px; padding: 10px 0; overflow-x: auto; border-top: 1px solid #3d3026; }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab { background: transparent; border: 1px solid #5a4030; color: #a08060; border-radius: 20px; padding: 4px 12px; font-size: 11px; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans TC', sans-serif; }
    .cat-tab.active { background: #e8a84a; border-color: #e8a84a; color: #2d2016; font-weight: 500; }
    .content { padding: 12px 16px; max-width: 600px; margin: 0 auto; }
    .section-title { font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 700; margin: 16px 0 10px; padding-bottom: 6px; border-bottom: 2px solid #e8d5b0; }
    .menu-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
    .menu-card { background: #fff; border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 6px rgba(45,32,22,0.06); border: 1px solid #f0e8d8; position: relative; overflow: hidden; }
    .popular-badge { position: absolute; top: 0; right: 0; background: #e8a84a; color: #2d2016; font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 0 10px 0 8px; }
    .item-emoji { font-size: 28px; width: 40px; text-align: center; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .item-desc { font-size: 11px; color: #8a7060; line-height: 1.3; }
    .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    .item-price { font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 700; color: #c4620a; }
    .qty-control { display: flex; align-items: center; gap: 6px; background: #faf7f2; border-radius: 20px; padding: 2px; border: 1px solid #e8d5b0; }
    .qty-btn { width: 24px; height: 24px; border-radius: 50%; border: none; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .qty-btn.minus { background: #f0e8d8; color: #8a7060; }
    .qty-btn.plus { background: #2d2016; color: #e8a84a; }
    .qty-num { font-weight: 600; font-size: 13px; min-width: 16px; text-align: center; }
    .add-btn { background: #2d2016; color: #e8a84a; border: none; border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
    .overlay { position: fixed; inset: 0; background: rgba(45,32,22,0.5); z-index: 200; display: none; }
    .cart-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; padding: 18px 18px 30px; z-index: 201; max-height: 80vh; overflow-y: auto; max-width: 600px; margin: 0 auto; display: none; }
    .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #f0e8d8; }
    .cart-title { font-family: 'Noto Serif TC', serif; font-size: 17px; font-weight: 700; }
    .close-btn { background: #f0e8d8; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; color: #8a7060; }
    .cart-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f5f0ea; }
    .cart-item-emoji { font-size: 22px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 13px; font-weight: 500; }
    .cart-item-price { font-size: 11px; color: #c4620a; margin-top: 2px; }
    .empty-cart { text-align: center; padding: 36px 0; color: #a08060; font-size: 13px; }
    .cart-summary { background: #faf7f2; border-radius: 10px; padding: 14px; margin: 14px 0; }
    .summary-row { display: flex; justify-content: space-between; font-size: 12px; color: #8a7060; margin-bottom: 5px; }
    .summary-row.total { font-size: 15px; font-weight: 700; color: #2d2016; margin-top: 8px; padding-top: 8px; border-top: 1px solid #e8d5b0; margin-bottom: 0; }
    .note-label { font-size: 11px; color: #8a7060; margin-bottom: 5px; display: block; }
    .note-input { width: 100%; border: 1px solid #e8d5b0; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #2d2016; background: #faf7f2; resize: none; margin-bottom: 12px; outline: none; font-family: 'Noto Sans TC', sans-serif; }
    .order-btn { width: 100%; background: linear-gradient(135deg, #2d2016, #4a3020); color: #e8a84a; border: none; border-radius: 12px; padding: 14px; font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
    .order-btn:disabled { opacity: 0.6; }
    .sending-msg { text-align: center; font-size: 12px; color: #8a7060; margin-bottom: 8px; }
    .success-overlay { position: fixed; inset: 0; background: rgba(45,32,22,0.85); z-index: 300; display: none; align-items: center; justify-content: center; }
    .success-box { background: #fff; border-radius: 18px; padding: 36px 28px; text-align: center; max-width: 300px; width: 88%; }
    .success-icon { font-size: 50px; margin-bottom: 12px; }
    .success-title { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .success-msg { font-size: 13px; color: #8a7060; line-height: 1.6; margin-bottom: 20px; }
    .success-btn { background: #2d2016; color: #e8a84a; border: none; border-radius: 10px; padding: 10px 28px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">如意樂活<span>蔬食早午餐</span></div>
    <button class="cart-btn" onclick="openCart()">
      🛒 購物車 <span class="cart-badge" id="cart-count" style="display:none">0</span>
    </button>
  </div>
  <div class="header-sub">餐點全素・蛋奶素者都可以吃・現點現做</div>
  <div class="cat-tabs" id="cat-tabs"></div>
</div>

<div class="content" id="menu-content"></div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <div class="cart-title">🛒 我的訂單</div>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div id="cart-body"></div>
</div>

<div class="success-overlay" id="success-overlay">
  <div class="success-box">
    <div class="success-icon">🎉</div>
    <div class="success-title">訂單成立！</div>
    <div class="success-msg" id="success-msg"></div>
    <button class="success-btn" onclick="closeSuccess()">繼續點餐</button>
  </div>
</div>

<script>
const API_URL = "https://food-order-api-two.vercel.app/api/notify";

const menuData = [
  { category: "🥚 軟Q手工蛋餅", items: [
    { id:1, name:"原味招牌蛋餅", price:28, desc:"每日新鮮手煎餅皮＋自製醬料", emoji:"🥚", popular:true },
    { id:2, name:"玉米蛋餅", price:33, desc:"香甜玉米粒，口感豐富", emoji:"🌽" },
    { id:3, name:"紅蘿蔔蛋餅", price:35, desc:"健康蔬食，清甜爽口", emoji:"🥕" },
    { id:4, name:"塔香蛋餅", price:35, desc:"九層塔香氣四溢", emoji:"🌿" },
    { id:5, name:"青椒蛋餅", price:38, desc:"清脆青椒，清爽健康", emoji:"🫑" },
    { id:6, name:"起士蛋餅", price:38, desc:"濃郁起士，香氣滿溢", emoji:"🧀", popular:true },
    { id:7, name:"金針菇蛋餅", price:38, desc:"鮮嫩金針菇，口感Q彈", emoji:"🍄" },
    { id:8, name:"高麗菜蛋餅", price:40, desc:"新鮮高麗菜，清甜爽脆", emoji:"🥬" },
    { id:9, name:"馬鈴薯蛋餅", price:40, desc:"鬆軟馬鈴薯，飽足感十足", emoji:"🥔" },
    { id:10, name:"地瓜蛋餅", price:40, desc:"香甜地瓜，自然甜味", emoji:"🍠" },
    { id:11, name:"南瓜蛋餅", price:40, desc:"濃郁南瓜，營養豐富", emoji:"🎃" },
    { id:12, name:"總匯蛋餅", price:55, desc:"多種食材，豐盛美味", emoji:"🥚", popular:true },
  ]},
  { category: "🍞 元氣吐司", items: [
    { id:13, name:"玉米蛋吐司", price:35, desc:"內含生菜、黃瓜、蕃茄", emoji:"🌽" },
    { id:14, name:"水果吐司", price:35, desc:"新鮮水果，清爽美味", emoji:"🍓" },
    { id:15, name:"香煎馬鈴薯吐司", price:38, desc:"香煎馬鈴薯，鬆軟可口", emoji:"🥔" },
    { id:16, name:"香煎地瓜吐司", price:38, desc:"香甜地瓜，健康美味", emoji:"🍠" },
    { id:17, name:"歐姆起司蛋吐司", price:40, desc:"含起士，濃郁香滑", emoji:"🧀", popular:true },
    { id:18, name:"南瓜蛋吐司", price:48, desc:"南瓜內餡，營養滿分", emoji:"🎃" },
    { id:19, name:"馬鈴薯歐姆蛋吐司", price:55, desc:"含起士，豐盛飽足", emoji:"🥔" },
    { id:20, name:"地瓜歐姆蛋吐司", price:55, desc:"含起士，香甜濃郁", emoji:"🍠" },
    { id:21, name:"地瓜總匯吐司", price:65, desc:"含起士，多種食材", emoji:"🍠", popular:true },
    { id:22, name:"馬鈴薯總匯吐司", price:65, desc:"含起士，豐盛總匯", emoji:"🥔" },
  ]},
  { category: "🍽️ 活力單點", items: [
    { id:23, name:"花生吐司", price:20, desc:"香濃花生醬，經典美味", emoji:"🥜" },
    { id:24, name:"巧克力吐司", price:20, desc:"香甜巧克力，幸福滋味", emoji:"🍫" },
    { id:25, name:"芝麻吐司", price:25, desc:"香濃芝麻，營養豐富", emoji:"⚫" },
    { id:26, name:"香煎馬鈴薯片", price:35, desc:"香脆馬鈴薯，酥脆好吃", emoji:"🥔" },
    { id:27, name:"香煎地瓜片", price:35, desc:"香甜地瓜片，健康美味", emoji:"🍠" },
    { id:28, name:"厚蛋歐姆", price:38, desc:"含起士，厚實香滑", emoji:"🍳", popular:true },
  ]},
  { category: "🥤 活力飲品", items: [
    { id:29, name:"非基改豆漿", price:20, desc:"純正豆漿，香醇濃郁", emoji:"🥛", popular:true },
    { id:30, name:"錫蘭紅茶", price:20, desc:"清香紅茶，提神醒腦", emoji:"🍵" },
    { id:31, name:"豆漿紅茶", price:20, desc:"豆漿加紅茶，獨特風味", emoji:"🧋" },
    { id:32, name:"芝麻豆漿", price:25, desc:"芝麻豆漿，香濃順口", emoji:"⚫" },
  ]},
];

// 建立 id -> item 的快速查詢
const itemMap = {};
menuData.forEach(s => s.items.forEach(i => itemMap[i.id] = i));

let cart = {};
let activeCategory = null;

function getQty(id) { return cart[id] ? cart[id] : 0; }

function addItem(id) {
  cart[id] = (cart[id] || 0) + 1;
  render();
}

function removeItem(id) {
  if (!cart[id]) return;
  cart[id]--;
  if (cart[id] <= 0) delete cart[id];
  render();
}

function setCategory(cat) {
  activeCategory = cat;
  render();
}

function openCart() {
  document.getElementById("overlay").style.display = "block";
  document.getElementById("cart-panel").style.display = "block";
  renderCart();
}

function closeCart() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("cart-panel").style.display = "none";
}

function closeSuccess() {
  document.getElementById("success-overlay").style.display = "none";
}

function render() {
  renderTabs();
  renderMenu();
  renderCartCount();
}

function renderTabs() {
  let html = `<button class="cat-tab ${!activeCategory ? 'active' : ''}" onclick="setCategory(null)">全部</button>`;
  menuData.forEach(s => {
    html += `<button class="cat-tab ${activeCategory === s.category ? 'active' : ''}" onclick="setCategory(${JSON.stringify(s.category)})">${s.category}</button>`;
  });
  document.getElementById("cat-tabs").innerHTML = html;
}

function renderMenu() {
  const filtered = activeCategory ? menuData.filter(s => s.category === activeCategory) : menuData;
  let html = "";
  filtered.forEach(section => {
    html += `<div class="section-title">${section.category}</div><div class="menu-grid">`;
    section.items.forEach(item => {
      const qty = getQty(item.id);
      html += `<div class="menu-card">
        ${item.popular ? '<div class="popular-badge">熱銷</div>' : ''}
        <div class="item-emoji">${item.emoji}</div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
        </div>
        <div class="item-right">
          <div class="item-price">$${item.price}</div>
          ${qty === 0
            ? `<button class="add-btn" onclick="addItem(${item.id})">加入</button>`
            : `<div class="qty-control">
                <button class="qty-btn minus" onclick="removeItem(${item.id})">−</button>
                <span class="qty-num">${qty}</span>
                <button class="qty-btn plus" onclick="addItem(${item.id})">+</button>
               </div>`
          }
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById("menu-content").innerHTML = html;
}

function renderCartCount() {
  const total = Object.values(cart).reduce((s, q) => s + q, 0);
  const badge = document.getElementById("cart-count");
  badge.textContent = total;
  badge.style.display = total > 0 ? "inline-flex" : "none";
}

function renderCart() {
  const ids = Object.keys(cart).filter(id => cart[id] > 0);
  const totalCount = ids.reduce((s, id) => s + cart[id], 0);
  const totalPrice = ids.reduce((s, id) => s + itemMap[id].price * cart[id], 0);

  if (ids.length === 0) {
    document.getElementById("cart-body").innerHTML = `<div class="empty-cart"><div style="font-size:44px;margin-bottom:8px">🍽️</div>購物車是空的，快去選些美食吧！</div>`;
    return;
  }

  let html = "";
  ids.forEach(id => {
    const item = itemMap[id];
    const qty = cart[id];
    html += `<div class="cart-item">
      <div class="cart-item-emoji">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">$${item.price} × ${qty}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn minus" onclick="removeItem(${id});renderCart()">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn plus" onclick="addItem(${id});renderCart()">+</button>
      </div>
    </div>`;
  });

  html += `<div class="cart-summary">
    <div class="summary-row"><span>品項數量</span><span>${totalCount} 件</span></div>
    <div class="summary-row"><span>外帶/內用</span><span>請備註說明</span></div>
    <div class="summary-row total"><span>合計</span><span>$${totalPrice}</span></div>
  </div>
  <label class="note-label">備註（外帶/內用桌號/特殊需求）</label>
  <textarea class="note-input" id="note-input" rows="2" placeholder="例：外帶、內用3號桌、不加蛋..."></textarea>

  <div class="sending-msg" id="sending-msg" style="display:none">📨 傳送中...</div>
  <button class="order-btn" id="order-btn" onclick="placeOrder()">立即下單</button>`;

document.getElementById(“cart-body”).innerHTML = html;
}

async function placeOrder() {
const ids = Object.keys(cart).filter(id => cart[id] > 0);
if (ids.length === 0) return;

const items = ids.map(id => ({ …itemMap[id], qty: cart[id] }));
const total = items.reduce((s, i) => s + i.price * i.qty, 0);
const note = document.getElementById(“note-input”) ? document.getElementById(“note-input”).value : “”;
const orderId = Math.floor(Math.random() * 90000) + 10000;

document.getElementById(“order-btn”).disabled = true;
document.getElementById(“sending-msg”).style.display = “block”;

try {
await fetch(API_URL, {
method: “POST”,
headers: { “Content-Type”: “application/json” },
body: JSON.stringify({ items, total, note, orderId }),
});
} catch(e) { console.error(e); }

cart = {};
closeCart();
renderCartCount();

document.getElementById(“success-msg”).innerHTML = `感謝您的訂購！<br>訂單編號：#${orderId}<br>請稍候，我們盡快為您準備`;
const overlay = document.getElementById(“success-overlay”);
overlay.style.display = “flex”;
}

// 初始化
render();
</script>

</body>
</html>
