<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>如意樂活蔬食早午餐</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:#f0f7f0;color:#1a3a1a;}
.header{background:linear-gradient(135deg,#2d6a2d,#4a9e4a);color:#fff;padding:16px 20px 0;position:sticky;top:0;z-index:100;}
.header-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;}
.brand{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;}
.brand span{color:#c8f0a0;}
.cart-btn{background:#c8f0a0;border:none;border-radius:50px;padding:7px 14px;font-size:13px;font-weight:500;color:#1a3a1a;cursor:pointer;display:flex;align-items:center;gap:5px;}
.cart-badge{background:#2d6a2d;color:#c8f0a0;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.header-sub{font-size:11px;color:#d4f0d4;padding-bottom:10px;}
.cat-tabs{display:flex;gap:6px;padding:10px 0;overflow-x:auto;border-top:1px solid rgba(255,255,255,0.2);}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{background:transparent;border:1px solid rgba(255,255,255,0.4);color:#d4f0d4;border-radius:20px;padding:4px 12px;font-size:11px;cursor:pointer;white-space:nowrap;}
.cat-tab.active{background:#c8f0a0;border-color:#c8f0a0;color:#1a3a1a;font-weight:500;}
.admin-bar{background:#fff3cd;padding:8px 16px;font-size:12px;color:#856404;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.admin-bar button{background:#856404;color:#fff;border:none;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;white-space:nowrap;}
.content{padding:12px 16px;max-width:600px;margin:0 auto;}
.section-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;color:#2d6a2d;margin:16px 0 6px;padding-bottom:6px;border-bottom:2px solid #a8d8a8;display:flex;justify-content:space-between;align-items:center;}
.add-item-btn{background:#2d6a2d;color:#fff;border:none;border-radius:8px;padding:3px 10px;font-size:11px;cursor:pointer;}
.del-cat-btn{background:#e53e3e;color:#fff;border:none;border-radius:8px;padding:3px 10px;font-size:11px;cursor:pointer;}
.menu-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:6px;}
.menu-card{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 2px 8px rgba(45,106,45,0.08);border:1px solid #d4ecd4;position:relative;overflow:hidden;}
.menu-card.sold-out{background:#f5f5f5;border-color:#ddd;opacity:0.7;}
.popular-badge{position:absolute;top:0;right:0;background:#4a9e4a;color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:0 12px 0 8px;}
.sold-out-badge{position:absolute;top:0;right:0;background:#999;color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:0 12px 0 8px;}
.card-top{display:flex;align-items:center;justify-content:space-between;}
.item-info{flex:1;}
.item-name{font-size:14px;font-weight:500;color:#1a3a1a;margin-bottom:2px;}
.item-name.faded{color:#999;}
.item-desc{font-size:11px;color:#5a7a5a;line-height:1.3;}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:10px;}
.item-price{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;color:#2d6a2d;}
.item-price.faded{color:#999;}
.qty-control{display:flex;align-items:center;gap:6px;background:#f0f7f0;border-radius:20px;padding:2px;border:1px solid #a8d8a8;}
.qty-btn{width:24px;height:24px;border-radius:50%;border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.qty-btn.minus{background:#d4ecd4;color:#2d6a2d;}
.qty-btn.plus{background:#2d6a2d;color:#c8f0a0;}
.qty-num{font-weight:600;font-size:13px;min-width:16px;text-align:center;}
.add-btn{background:#2d6a2d;color:#c8f0a0;border:none;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;}
.sold-out-btn{background:#ccc;color:#fff;border:none;border-radius:20px;padding:5px 12px;font-size:12px;}
.admin-actions{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.btn-so{border:none;border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;background:#ff9800;color:#fff;}
.btn-uso{border:none;border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;background:#4a9e4a;color:#fff;}
.btn-del{border:none;border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;background:#e53e3e;color:#fff;}
.sauce-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.sauce-btn{border:1px solid #a8d8a8;background:#f0f7f0;color:#2d6a2d;border-radius:20px;padding:3px 10px;font-size:11px;cursor:pointer;}
.sauce-btn.selected{background:#2d6a2d;color:#fff;border-color:#2d6a2d;}
.overlay{position:fixed;inset:0;background:rgba(26,58,26,0.5);z-index:200;display:none;}
.panel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:18px 18px 30px;z-index:201;max-height:85vh;overflow-y:auto;display:none;}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #d4ecd4;}
.panel-title{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;color:#1a3a1a;}
.close-btn{background:#d4ecd4;border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:#2d6a2d;}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #eaf4ea;}
.cart-item-info{flex:1;}
.cart-item-name{font-size:13px;font-weight:500;color:#1a3a1a;}
.cart-item-sub{font-size:11px;color:#4a9e4a;margin-top:2px;}
.empty-cart{text-align:center;padding:36px 0;color:#5a7a5a;font-size:13px;}
.cart-summary{background:#f0f7f0;border-radius:10px;padding:14px;margin:14px 0;}
.summary-row{display:flex;justify-content:space-between;font-size:12px;color:#5a7a5a;margin-bottom:5px;}
.summary-total{display:flex;justify-content:space-between;font-size:15px;font-weight:700;color:#1a3a1a;margin-top:8px;padding-top:8px;border-top:1px solid #a8d8a8;}
.field-label{font-size:11px;color:#5a7a5a;margin-bottom:5px;margin-top:10px;display:block;font-weight:500;}
.field-input{width:100%;border:1px solid #a8d8a8;border-radius:8px;padding:8px 12px;font-size:13px;color:#1a3a1a;background:#f0f7f0;outline:none;font-family:'Noto Sans TC',sans-serif;}
.note-input{width:100%;border:1px solid #a8d8a8;border-radius:8px;padding:8px 12px;font-size:12px;color:#1a3a1a;background:#f0f7f0;resize:none;outline:none;font-family:'Noto Sans TC',sans-serif;}
.time-select{width:100%;border:1px solid #a8d8a8;border-radius:8px;padding:8px 12px;font-size:13px;color:#1a3a1a;background:#f0f7f0;outline:none;font-family:'Noto Sans TC',sans-serif;}
.order-btn{width:100%;background:linear-gradient(135deg,#2d6a2d,#4a9e4a);color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-top:12px;}
.order-btn:disabled{opacity:0.6;}
.confirm-btn{background:#2d6a2d;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;width:100%;margin-top:8px;}
.cancel-btn{background:#ddd;color:#555;border:none;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;width:100%;margin-top:6px;}
.checkbox-row{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:13px;}
.saving-msg{text-align:center;font-size:12px;color:#5a7a5a;margin-top:8px;}
.success-overlay{position:fixed;inset:0;background:rgba(26,58,26,0.85);z-index:300;display:none;align-items:center;justify-content:center;}
.success-box{background:#fff;border-radius:18px;padding:36px 28px;text-align:center;max-width:300px;width:88%;}
.success-icon{font-size:50px;margin-bottom:12px;}
.success-title{font-family:'Noto Serif TC',serif;font-size:20px;font-weight:700;color:#1a3a1a;margin-bottom:6px;}
.success-msg{font-size:13px;color:#5a7a5a;line-height:1.6;margin-bottom:20px;}
.success-btn{background:#2d6a2d;color:#c8f0a0;border:none;border-radius:10px;padding:10px 28px;font-size:13px;cursor:pointer;}
.pwd-overlay{position:fixed;inset:0;background:rgba(26,58,26,0.85);z-index:400;display:none;align-items:center;justify-content:center;}
.pwd-box{background:#fff;border-radius:18px;padding:30px 24px;text-align:center;max-width:280px;width:88%;}
.pwd-title{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;color:#1a3a1a;margin-bottom:16px;}
.pwd-input{width:100%;border:1px solid #a8d8a8;border-radius:8px;padding:10px 12px;font-size:16px;color:#1a3a1a;background:#f0f7f0;outline:none;text-align:center;letter-spacing:4px;margin-bottom:12px;}
.pwd-btn{background:#2d6a2d;color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:13px;cursor:pointer;margin-right:8px;}
.pwd-cancel{background:#ddd;color:#555;border:none;border-radius:10px;padding:10px 20px;font-size:13px;cursor:pointer;}
.pwd-error{color:#e53e3e;font-size:12px;margin-top:8px;}
.loading{text-align:center;padding:40px;color:#5a7a5a;font-size:14px;}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="brand" onclick="adminClick()" style="cursor:pointer">如意樂活<span>蔬食早午餐</span></div>
    <button class="cart-btn" onclick="openCart()">購物車 <span class="cart-badge" id="cart-count" style="display:none">0</span></button>
  </div>
  <div class="header-sub">餐點全素・蛋奶素者都可以吃・現點現做</div>
  <div class="cat-tabs" id="cat-tabs"></div>
</div>
<div id="admin-bar" style="display:none" class="admin-bar">
  <span>&#9881; 管理模式</span>
  <div style="display:flex;gap:6px">
    <button onclick="openAddCat()">新增分類</button>
    <button onclick="exitAdmin()">離開</button>
  </div>
</div>
<div class="content" id="menu-content"><div class="loading">載入中...</div></div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="cart-panel">
  <div class="panel-header"><div class="panel-title">我的訂單</div><button class="close-btn" onclick="closePanel()">X</button></div>
  <div id="cart-body"></div>
</div>
<div class="panel" id="add-item-panel">
  <div class="panel-header"><div class="panel-title" id="add-item-title">新增品項</div><button class="close-btn" onclick="closePanel()">X</button></div>
  <label class="field-label">品項名稱</label>
  <input class="field-input" id="new-name" placeholder="例：起士蛋餅"/>
  <label class="field-label">價格（元）</label>
  <input class="field-input" id="new-price" type="number" placeholder="例：38"/>
  <label class="field-label">描述</label>
  <input class="field-input" id="new-desc" placeholder="例：濃郁起士，香氣滿溢"/>
  <div class="checkbox-row"><input type="checkbox" id="new-hot"/><label for="new-hot">標記為熱銷</label></div>
  <div class="saving-msg" id="save-item-msg" style="display:none">儲存中...</div>
  <button class="confirm-btn" onclick="saveNewItem()">新增</button>
  <button class="cancel-btn" onclick="closePanel()">取消</button>
</div>
<div class="panel" id="add-cat-panel">
  <div class="panel-header"><div class="panel-title">新增分類</div><button class="close-btn" onclick="closePanel()">X</button></div>
  <label class="field-label">分類名稱</label>
  <input class="field-input" id="new-cat-name" placeholder="例：特餐"/>
  <div class="checkbox-row"><input type="checkbox" id="new-cat-sauce"/><label for="new-cat-sauce">此分類有醬料選項（蛋餅類）</label></div>
  <div class="saving-msg" id="save-cat-msg" style="display:none">儲存中...</div>
  <button class="confirm-btn" onclick="saveNewCat()">新增分類</button>
  <button class="cancel-btn" onclick="closePanel()">取消</button>
</div>

<div class="success-overlay" id="success-overlay">
  <div class="success-box">
    <div class="success-icon">&#x1F389;</div>
    <div class="success-title">訂單成立！</div>
    <div class="success-msg" id="success-msg"></div>
    <button class="success-btn" onclick="closeSuccess()">繼續點餐</button>
  </div>
</div>
<div class="pwd-overlay" id="pwd-overlay">
  <div class="pwd-box">
    <div class="pwd-title">輸入管理密碼</div>
    <input class="pwd-input" id="pwd-input" type="password" maxlength="10"/>
    <div id="pwd-error" class="pwd-error" style="display:none">密碼錯誤</div>
    <div style="margin-top:12px">
      <button class="pwd-btn" onclick="checkPwd()">確認</button>
      <button class="pwd-cancel" onclick="closePwd()">取消</button>
    </div>
  </div>
</div>

<script>
var NOTIFY_API="https://food-order-api-two.vercel.app/api/notify";
var MENU_API="https://food-order-api-two.vercel.app/api/menu";
var ADMIN_PWD="369369";
var orderCounter=1;
var isAdmin=false;
var addingToCat=null;
var adminClickCount=0;
var adminClickTimer=null;
var menu=[];
var menuSha="";
var soldOut={};
var cart={};
var sauce={};
var activeCat=null;
var sauceOptions=["自製醬油","自製番茄醬","不要醬"];

function loadMenu(){
  fetch(MENU_API).then(function(r){return r.json();}).then(function(d){
    menu=d.menu;
    menuSha=d.sha;
    render();
  }).catch(function(){
    document.getElementById("menu-content").innerHTML='<div class="loading">載入失敗，請重新整理</div>';
  });
}

function saveMenuToGithub(callback){
  fetch(MENU_API,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({menu:menu,sha:menuSha})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.sha)menuSha=d.sha;
    if(callback)callback();
  }).catch(function(e){console.error(e);alert("儲存失敗！");});
}

function nextId(){
  var max=0;
  for(var s=0;s<menu.length;s++)for(var i=0;i<menu[s].items.length;i++)if(menu[s].items[i].id>max)max=menu[s].items[i].id;
  return max+1;
}

function adminClick(){
  adminClickCount++;
  if(adminClickTimer)clearTimeout(adminClickTimer);
  adminClickTimer=setTimeout(function(){adminClickCount=0;},1500);
  if(adminClickCount>=3){
    adminClickCount=0;
    document.getElementById("pwd-overlay").style.display="flex";
    document.getElementById("pwd-input").value="";
    document.getElementById("pwd-error").style.display="none";
    setTimeout(function(){document.getElementById("pwd-input").focus();},100);
  }
}
function checkPwd(){
  if(document.getElementById("pwd-input").value===ADMIN_PWD){
    isAdmin=true;
    document.getElementById("pwd-overlay").style.display="none";
    document.getElementById("admin-bar").style.display="flex";
    render();
  } else {
    document.getElementById("pwd-error").style.display="block";
    document.getElementById("pwd-input").value="";
  }
}
function closePwd(){document.getElementById("pwd-overlay").style.display="none";}
function exitAdmin(){isAdmin=false;document.getElementById("admin-bar").style.display="none";render();}

function toggleSoldOut(id){
  soldOut[id]=!soldOut[id];
  if(soldOut[id]&&cart[id]){delete cart[id];delete sauce[id];}
  render();
}
function deleteItem(catIndex,id){
  if(!confirm("確定要刪除這個品項？"))return;
  menu[catIndex].items=menu[catIndex].items.filter(function(it){return it.id!==id;});
  saveMenuToGithub(function(){render();});
}
function deleteCat(catIndex){
  if(!confirm("確定要刪除整個分類？"))return;
  menu.splice(catIndex,1);
  saveMenuToGithub(function(){render();});
}
function openAddItem(catIndex){
  addingToCat=catIndex;
  document.getElementById("new-name").value="";
  document.getElementById("new-price").value="";
  document.getElementById("new-desc").value="";
  document.getElementById("new-hot").checked=false;
  document.getElementById("add-item-title").textContent="新增品項 - "+menu[catIndex].cat;
  document.getElementById("save-item-msg").style.display="none";
  showPanel("add-item-panel");
}
function saveNewItem(){
  var name=document.getElementById("new-name").value.trim();
  var price=parseInt(document.getElementById("new-price").value);
  var desc=document.getElementById("new-desc").value.trim();
  var hot=document.getElementById("new-hot").checked;
  if(!name||!price){alert("請填寫名稱和價格！");return;}
  var item={id:nextId(),name:name,price:price,desc:desc||""};
  if(hot)item.hot=true;
  menu[addingToCat].items.push(item);
  document.getElementById("save-item-msg").style.display="block";
  saveMenuToGithub(function(){
    document.getElementById("save-item-msg").style.display="none";
    closePanel();
    render();
  });
}
function openAddCat(){
  document.getElementById("new-cat-name").value="";
  document.getElementById("new-cat-sauce").checked=false;
  document.getElementById("save-cat-msg").style.display="none";
  showPanel("add-cat-panel");
}
function saveNewCat(){
  var name=document.getElementById("new-cat-name").value.trim();
  if(!name){alert("請填寫分類名稱！");return;}
  var cat={cat:name,items:[]};
  if(document.getElementById("new-cat-sauce").checked)cat.hasSauce=true;
  menu.push(cat);
  document.getElementById("save-cat-msg").style.display="block";
  saveMenuToGithub(function(){
    document.getElementById("save-cat-msg").style.display="none";
    closePanel();
    render();
  });
}

function q(id){return cart[id]||0;}
function add(id){if(soldOut[id])return;cart[id]=(cart[id]||0)+1;if(!sauce[id])sauce[id]="自製醬油";render();}
function rem(id){if(!cart[id])return;cart[id]--;if(cart[id]<=0){delete cart[id];delete sauce[id];}render();}
function setSauce(id,s){sauce[id]=s;renderMenu();}
function setCat(c){activeCat=c;render();}

function showPanel(id){
  document.getElementById("overlay").style.display="block";
  document.getElementById(id).style.display="block";
}
function openCart(){showPanel("cart-panel");renderCart();}
function closePanel(){
  document.getElementById("overlay").style.display="none";
  var panels=["cart-panel","add-item-panel","add-cat-panel"];
  for(var i=0;i<panels.length;i++)document.getElementById(panels[i]).style.display="none";
}
function closeSuccess(){document.getElementById("success-overlay").style.display="none";}
function render(){renderTabs();renderMenu();renderCount();}

function renderTabs(){
  var h='<button class="cat-tab '+(activeCat===null?'active':'')+'" onclick="setCat(null)">全部</button>';
  for(var i=0;i<menu.length;i++){var c=menu[i].cat;h+='<button class="cat-tab '+(activeCat===c?'active':'')+'" onclick="setCat(\''+c+'\')">'+c+'</button>';}
  document.getElementById("cat-tabs").innerHTML=h;
}

function renderMenu(){
  var filtered=activeCat?menu.filter(function(s){return s.cat===activeCat;}):menu;
  var h="";
  for(var si=0;si<filtered.length;si++){
    var sec=filtered[si];
    var catIndex=menu.indexOf(sec);
    h+='<div class="section-title">'+sec.cat;
    if(isAdmin){
      h+='<div style="display:flex;gap:4px">';
      h+='<button class="add-item-btn" onclick="openAddItem('+catIndex+')">+ 新增</button>';
      h+='<button class="del-cat-btn" onclick="deleteCat('+catIndex+')">刪除分類</button>';
      h+='</div>';
    }
    h+='</div><div class="menu-grid">';
    for(var i=0;i<sec.items.length;i++){
      var it=sec.items[i];var qt=q(it.id);var so=soldOut[it.id];
      h+='<div class="menu-card'+(so?' sold-out':'')+'">';
      if(so){h+='<div class="sold-out-badge">售完</div>';}
      else if(it.hot){h+='<div class="popular-badge">熱銷</div>';}
      h+='<div class="card-top">';
      h+='<div class="item-info"><div class="item-name'+(so?' faded':'')+'">'+it.name+'</div><div class="item-desc">'+it.desc+'</div></div>';
      h+='<div class="item-right"><div class="item-price'+(so?' faded':'')+'">$'+it.price+'</div>';
      if(!isAdmin){
        if(so){h+='<button class="sold-out-btn">售完</button>';}
        else if(qt===0){h+='<button class="add-btn" onclick="add('+it.id+')">加入</button>';}
        else{h+='<div class="qty-control"><button class="qty-btn minus" onclick="rem('+it.id+')">-</button><span class="qty-num">'+qt+'</span><button class="qty-btn plus" onclick="add('+it.id+')">+</button></div>';}
      }
      h+='</div></div>';
      if(isAdmin){
        h+='<div class="admin-actions">';
        if(so){h+='<button class="btn-uso" onclick="toggleSoldOut('+it.id+')">恢復供應</button>';}
        else{h+='<button class="btn-so" onclick="toggleSoldOut('+it.id+')">標記售完</button>';}
        h+='<button class="btn-del" onclick="deleteItem('+catIndex+','+it.id+')">刪除品項</button>';
        h+='</div>';
      }
      if(sec.hasSauce&&qt>0&&!so&&!isAdmin){
        h+='<div class="sauce-row">';
        for(var k=0;k<sauceOptions.length;k++){var sv=sauceOptions[k];h+='<button class="sauce-btn '+(sauce[it.id]===sv?'selected':'')+'" onclick="setSauce('+it.id+',\''+sv+'\')">'+sv+'</button>';}
        h+='</div>';
      }
      h+='</div>';
    }
    h+='</div>';
  }
  document.getElementById("menu-content").innerHTML=h;
}

function renderCount(){
  var t=0;for(var id in cart)t+=cart[id];
  var b=document.getElementById("cart-count");
  b.textContent=t;b.style.display=t>0?"inline-flex":"none";
}

function buildImap(){
  var m={};
  for(var s=0;s<menu.length;s++)for(var i=0;i<menu[s].items.length;i++){var it=menu[s].items[i];m[it.id]=it;}
  return m;
}

function renderCart(){
  var imap=buildImap();
  var ids=Object.keys(cart).filter(function(id){return cart[id]>0;});
  var tc=0,tp=0;
  for(var i=0;i<ids.length;i++){tc+=cart[ids[i]];tp+=imap[ids[i]].price*cart[ids[i]];}
  if(ids.length===0){document.getElementById("cart-body").innerHTML='<div class="empty-cart">購物車是空的，快去選些美食吧！</div>';return;}
  var h="";
  for(var i=0;i<ids.length;i++){
    var id=ids[i];var it=imap[id];var qt=cart[id];
    h+='<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">'+it.name+'</div>';
    if(sauce[id])h+='<div class="cart-item-sub">醬料：'+sauce[id]+'</div>';
    h+='<div class="cart-item-sub">$'+it.price+' x '+qt+'</div></div>';
    h+='<div class="qty-control"><button class="qty-btn minus" onclick="rem('+id+');renderCart()">-</button><span class="qty-num">'+qt+'</span><button class="qty-btn plus" onclick="add('+id+');renderCart()">+</button></div></div>';
  }
  h+='<div class="cart-summary"><div class="summary-row"><span>品項數量</span><span>'+tc+' 件</span></div><div class="summary-total"><span>合計</span><span>$'+tp+'</span></div></div>';
  var times=[];
  var now=new Date();
  var start=now.getHours()*60+now.getMinutes();
  start=Math.ceil(start/15)*15+15;
  for(var m2=0;m2<8;m2++){var t2=start+m2*15;var hh=Math.floor(t2/60)%24;var mm=t2%60;times.push((hh<10?"0":"")+hh+":"+(mm<10?"0":"")+mm);}
  h+='<label class="field-label">取餐時間</label><select class="time-select" id="pickup-time"><option value="">請選擇取餐時間</option>';
  for(var i=0;i<times.length;i++)h+='<option>'+times[i]+'</option>';
  h+='</select>';
  h+='<label class="field-label">聯絡電話</label><input class="field-input" id="phone-input" type="tel" placeholder="請輸入手機號碼"/>';
  h+='<label class="field-label">備註（外帶/內用桌號/特殊需求）</label><textarea class="note-input" id="note-input" rows="2" placeholder="例：外帶、內用3號桌..."></textarea>';
  h+='<div class="saving-msg" id="sending-msg" style="display:none">傳送中...</div>';
  h+='<button class="order-btn" id="order-btn" onclick="placeOrder()">立即下單</button>';
  document.getElementById("cart-body").innerHTML=h;
}

function placeOrder(){
  var imap=buildImap();
  var ids=Object.keys(cart).filter(function(id){return cart[id]>0;});
  if(ids.length===0)return;
  var phone=document.getElementById("phone-input").value.trim();
  if(!phone){alert("請填寫聯絡電話！");return;}
  var pickup=document.getElementById("pickup-time").value;
  if(!pickup){alert("請選擇取餐時間！");return;}
  var items=ids.map(function(id){var it={id:Number(id),name:imap[id].name,price:imap[id].price,qty:cart[id]};if(sauce[id])it.sauce=sauce[id];return it;});
  var total=items.reduce(function(s,i){return s+i.price*i.qty;},0);
  var note=document.getElementById("note-input").value;
  var oid=String(orderCounter).padStart(3,"0");
  orderCounter++;
  document.getElementById("order-btn").disabled=true;
  document.getElementById("sending-msg").style.display="block";
  fetch(NOTIFY_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({items:items,total:total,note:note,orderId:oid,phone:phone,pickup:pickup})})
  .catch(function(e){console.error(e);})
  .finally(function(){
    cart={};sauce={};closePanel();renderCount();
    document.getElementById("success-msg").innerHTML="感謝您的訂購！<br>訂單編號：#"+oid+"<br>取餐時間："+pickup+"<br>請稍候，我們盡快為您準備";
    document.getElementById("success-overlay").style.display="flex";
  });
}

loadMenu();
</script>
</body>
</html>
