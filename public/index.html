<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>如意樂活蔬食早午餐</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #faf7f2; color: #2d2016; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .header { background: #2d2016; color: #f5e6c8; padding: 20px 24px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(45,32,22,0.3); }
    .header-top { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; }
    .brand { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 700; letter-spacing: 2px; }
    .brand span { color: #e8a84a; }
    .cart-btn { background: #e8a84a; border: none; border-radius: 50px; padding: 8px 16px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 500; color: #2d2016; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
    .cart-btn:hover { background: #f0bc62; }
    .cart-badge { background: #2d2016; color: #e8a84a; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
    .header-sub { font-size: 12px; color: #a08060; letter-spacing: 1px; padding-bottom: 12px; }
    .cat-tabs { display: flex; gap: 8px; padding: 12px 0; overflow-x: auto; border-top: 1px solid #3d3026; }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab { background: transparent; border: 1px solid #5a4030; color: #a08060; border-radius: 20px; padding: 5px 14px; font-family: 'Noto Sans TC', sans-serif; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .cat-tab.active { background: #e8a84a; border-color: #e8a84a; color: #2d2016; font-weight: 500; }
    .content { flex: 1; padding: 16px; max-width: 600px; width: 100%; margin: 0 auto; }
    .section-title { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 700; color: #2d2016; margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 2px solid #e8d5b0; }
    .menu-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
    .menu-card { background: #fff; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 8px rgba(45,32,22,0.06); border: 1px solid #f0e8d8; transition: all 0.2s; position: relative; overflow: hidden; }
    .popular-badge { position: absolute; top: 0; right: 0; background: #e8a84a; color: #2d2016; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 0 12px 0 10px; }
    .item-emoji { font-size: 32px; width: 48px; text-align: center; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 15px; font-weight: 500; color: #2d2016; margin-bottom: 3px; }
    .item-desc { font-size: 12px; color: #8a7060; line-height: 1.4; }
    .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .item-price { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 700; color: #c4620a; }
    .qty-control { display: flex; align-items: center; gap: 8px; background: #faf7f2; border-radius: 20px; padding: 2px; border: 1px solid #e8d5b0; }
    .qty-btn { width: 26px; height: 26px; border-radius: 50%; border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; font-weight: 700; transition: all 0.15s; }
    .qty-btn.minus { background: #f0e8d8; color: #8a7060; }
    .qty-btn.plus { background: #2d2016; color: #e8a84a; }
    .qty-num { font-weight: 600; font-size: 14px; min-width: 18px; text-align: center; color: #2d2016; }
    .add-btn { background: #2d2016; color: #e8a84a; border: none; border-radius: 20px; padding: 6px 14px; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .cart-overlay { position: fixed; inset: 0; background: rgba(45,32,22,0.5); z-index: 200; backdrop-filter: blur(2px); }
    .cart-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; padding: 20px 20px 32px; z-index: 201; max-height: 80vh; overflow-y: auto; max-width: 600px; margin: 0 auto; }
    .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 2px solid #f0e8d8; }
    .cart-title { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; color: #2d2016; }
    .close-btn { background: #f0e8d8; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #8a7060; }
    .cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f5f0ea; }
    .cart-item-emoji { font-size: 24px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 500; color: #2d2016; }
    .cart-item-price { font-size: 12px; color: #c4620a; margin-top: 2px; }
    .empty-cart { text-align: center; padding: 40px 0; color: #a08060; font-size: 14px; }
    .empty-cart-icon { font-size: 48px; margin-bottom: 10px; }
    .cart-summary { background: #faf7f2; border-radius: 12px; padding: 16px; margin: 16px 0; }
    .summary-row { display: flex; justify-content: space-between; font-size: 13px; color: #8a7060; margin-bottom: 6px; }
    .summary-row.total { font-size: 16px; font-weight: 700; color: #2d2016; margin-top: 10px; padding-top: 10px; border-top: 1px solid #e8d5b0; margin-bottom: 0; }
    .order-btn { width: 100%; background: linear-gradient(135deg, #2d2016, #4a3020); color: #e8a84a; border: none; border-radius: 14px; padding: 16px; font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(45,32,22,0.3); }
    .order-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .success-overlay { position: fixed; inset: 0; background: rgba(45,32,22,0.85); z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .success-box { background: #fff; border-radius: 20px; padding: 40px 32px; text-align: center; max-width: 320px; width: 90%; }
    .success-icon { font-size: 56px; margin-bottom: 14px; }
    .success-title { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 700; color: #2d2016; margin-bottom: 8px; }
    .success-msg { font-size: 14px; color: #8a7060; line-height: 1.6; margin-bottom: 24px; }
    .success-btn { background: #2d2016; color: #e8a84a; border: none; border-radius: 12px; padding: 12px 32px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
    .note-input { width: 100%; border: 1px solid #e8d5b0; border-radius: 10px; padding: 10px 14px; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: #2d2016; background: #faf7f2; resize: none; margin-bottom: 14px; outline: none; }
    .note-input:focus { border-color: #e8a84a; }
    .note-label { font-size: 12px; color: #8a7060; margin-bottom: 6px; display: block; }
    .sending-msg { text-align: center; font-size: 13px; color: #8a7060; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const API_URL = "https://food-order-api-two.vercel.app/api/notify";

    const menuData = [
      {
        category: "🍱 主食",
        items: [
          { id: 1, name: "招牌滷肉飯", price: 65, desc: "祖傳秘方滷汁，軟嫩五花肉", emoji: "🍚", popular: true },
          { id: 2, name: "雞腿便當", price: 120, desc: "香煎雞腿配時蔬與白飯", emoji: "🍗", popular: true },
          { id: 3, name: "排骨飯", price: 110, desc: "酥脆排骨，現炸現賣", emoji: "🥩" },
          { id: 4, name: "素食炒飯", price: 80, desc: "時令蔬菜，清爽健康", emoji: "🌿" },
        ],
      },
      {
        category: "🍜 麵食",
        items: [
          { id: 5, name: "牛肉麵", price: 160, desc: "紅燒湯底，厚切牛腱心", emoji: "🍜", popular: true },
          { id: 6, name: "擔擔麵", price: 120, desc: "麻辣花生醬，配脆豬絞肉", emoji: "🌶️" },
          { id: 7, name: "蚵仔麵線", price: 60, desc: "Q彈麵線配鮮蚵", emoji: "🦪" },
        ],
      },
      {
        category: "🥗 小菜",
        items: [
          { id: 8, name: "滷蛋", price: 15, desc: "入味Q彈，滷香十足", emoji: "🥚" },
          { id: 9, name: "燙青菜", price: 30, desc: "當日新鮮時蔬", emoji: "🥦" },
          { id: 10, name: "豆腐", price: 25, desc: "嫩豆腐淋醬油膏", emoji: "🫙" },
        ],
      },
      {
        category: "🧋 飲料",
        items: [
          { id: 11, name: "珍珠奶茶", price: 55, desc: "手搖現做，Q彈珍珠", emoji: "🧋", popular: true },
          { id: 12, name: "冬瓜茶", price: 25, desc: "古早味甘甜，消暑解渴", emoji: "🍵" },
          { id: 13, name: "蘋果汁", price: 40, desc: "鮮榨純果汁，無添加", emoji: "🍎" },
        ],
      },
    ];

    function App() {
      const [cart, setCart] = useState({});
      const [showCart, setShowCart] = useState(false);
      const [showSuccess, setShowSuccess] = useState(false);
      const [activeCategory, setActiveCategory] = useState(null);
      const [note, setNote] = useState("");
      const [sending, setSending] = useState(false);
      const [orderId, setOrderId] = useState(null);

      const getQty = (id) => cart[id]?.qty || 0;

      const addItem = (item) => {
        setCart((prev) => ({
          ...prev,
          [item.id]: { ...item, qty: (prev[item.id]?.qty || 0) + 1 },
        }));
      };

      const removeItem = (item) => {
        setCart((prev) => {
          const qty = (prev[item.id]?.qty || 0) - 1;
          if (qty <= 0) {
            const next = { ...prev };
            delete next[item.id];
            return next;
          }
          return { ...prev, [item.id]: { ...item, qty } };
        });
      };

      const totalCount = Object.values(cart).reduce((s, i) => s + i.qty, 0);
      const totalPrice = Object.values(cart).reduce((s, i) => s + i.price * i.qty, 0);
      const cartItems = Object.values(cart).filter((i) => i.qty > 0);

      const placeOrder = async () => {
        setSending(true);
        const newOrderId = Math.floor(Math.random() * 90000) + 10000;
        try {
          await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items: cartItems, total: totalPrice, note, orderId: newOrderId }),
          });
        } catch (e) {
          console.error("LINE 通知失敗", e);
        }
        setSending(false);
        setOrderId(newOrderId);
        setShowCart(false);
        setShowSuccess(true);
        setCart({});
        setNote("");
      };

      const filteredMenu = activeCategory ? menuData.filter((c) => c.category === activeCategory) : menuData;

      return (
        <div className="app">
          <header className="header">
            <div className="header-top">
              <div className="brand">如意樂活<span>蔬食</span></div>
              <button className="cart-btn" onClick={() => setShowCart(true)}>
                🛒 購物車
                {totalCount > 0 && <span className="cart-badge">{totalCount}</span>}
              </button>
            </div>
            <div className="header-sub">現點現做 · 新鮮蔬食 · 健康美味</div>
            <div className="cat-tabs">
              <button className={`cat-tab ${!activeCategory ? "active" : ""}`} onClick={() => setActiveCategory(null)}>全部</button>
              {menuData.map((c) => (
                <button key={c.category} className={`cat-tab ${activeCategory === c.category ? "active" : ""}`} onClick={() => setActiveCategory(c.category)}>
                  {c.category}
                </button>
              ))}
            </div>
          </header>

          <main className="content">
            {filteredMenu.map((section) => (
              <div key={section.category}>
                <div className="section-title">{section.category}</div>
                <div className="menu-grid">
                  {section.items.map((item) => {
                    const qty = getQty(item.id);
                    return (
                      <div className="menu-card" key={item.id}>
                        {item.popular && <div className="popular-badge">熱銷</div>}
                        <div className="item-emoji">{item.emoji}</div>
                        <div className="item-info">
                          <div className="item-name">{item.name}</div>
                          <div className="item-desc">{item.desc}</div>
                        </div>
                        <div className="item-right">
                          <div className="item-price">${item.price}</div>
                          {qty === 0 ? (
                            <button className="add-btn" onClick={() => addItem(item)}>加入</button>
                          ) : (
                            <div className="qty-control">
                              <button className="qty-btn minus" onClick={() => removeItem(item)}>−</button>
                              <span className="qty-num">{qty}</span>
                              <button className="qty-btn plus" onClick={() => addItem(item)}>+</button>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </main>

          {showCart && (
            <>
              <div className="cart-overlay" onClick={() => setShowCart(false)} />
              <div className="cart-panel">
                <div className="cart-header">
                  <div className="cart-title">🛒 我的訂單</div>
                  <button className="close-btn" onClick={() => setShowCart(false)}>✕</button>
                </div>
                {cartItems.length === 0 ? (
                  <div className="empty-cart">
                    <div className="empty-cart-icon">🍽️</div>
                    <div>購物車是空的，快去選些美食吧！</div>
                  </div>
                ) : (
                  <>
                    {cartItems.map((item) => (
                      <div className="cart-item" key={item.id}>
                        <div className="cart-item-emoji">{item.emoji}</div>
                        <div className="cart-item-info">
                          <div className="cart-item-name">{item.name}</div>
                          <div className="cart-item-price">${item.price} × {item.qty}</div>
                        </div>
                        <div className="qty-control">
                          <button className="qty-btn minus" onClick={() => removeItem(item)}>−</button>
                          <span className="qty-num">{item.qty}</span>
                          <button className="qty-btn plus" onClick={() => addItem(item)}>+</button>
                        </div>
                      </div>
                    ))}
                    <div className="cart-summary">
                      <div className="summary-row"><span>品項數量</span><span>{totalCount} 件</span></div>
                      <div className="summary-row"><span>外送費</span><span>免費</span></div>
                      <div className="summary-row total"><span>合計</span><span>${totalPrice}</span></div>
                    </div>
                    <label className="note-label">備註（例：不加辣、少鹽）</label>
                    <textarea className="note-input" rows={2} placeholder="請輸入特殊需求..." value={note} onChange={(e) => setNote(e.target.value)} />
                    {sending && <div className="sending-msg">📨 傳送中，請稍候...</div>}
                    <button className="order-btn" onClick={placeOrder} disabled={cartItems.length === 0 || sending}>
                      {sending ? "傳送中..." : "立即下單"}
                    </button>
                  </>
                )}
              </div>
            </>
          )}

          {showSuccess && (
            <div className="success-overlay">
              <div className="success-box">
                <div className="success-icon">🎉</div>
                <div className="success-title">訂單成立！</div>
                <div className="success-msg">感謝您的訂購！<br />訂單編號：#{orderId}</div>
                <button className="success-btn" onClick={() => setShowSuccess(false)}>繼續點餐</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
